name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  snapshot:
    name: Snapshot test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run snapshot test
        run: npm test

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: snapshot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
